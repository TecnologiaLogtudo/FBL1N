server {
  listen 80;
  server_name _;
  client_max_body_size 30m;
  proxy_connect_timeout 60s;
  proxy_send_timeout 300s;
  proxy_read_timeout 300s;
  send_timeout 300s;

  root /usr/share/nginx/html;
  index index.html;

  location /NotasCompensadas-FBL1/ {
    try_files $uri $uri/ /NotasCompensadas-FBL1/index.html;
  }

  # Fallback para cenários em que o proxy externo faz strip do prefixo.
  location / {
    try_files $uri $uri/ /NotasCompensadas-FBL1/index.html;
  }

  location /NotasCompensadas-FBL1/api/ {
    rewrite ^/NotasCompensadas-FBL1(/.*)$ $1 break;
    proxy_pass http://backend:8000;
    proxy_http_version 1.1;
    proxy_request_buffering off;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/ {
    proxy_pass http://backend:8000;
    proxy_http_version 1.1;
    proxy_request_buffering off;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /NotasCompensadas-FBL1/health/ {
    rewrite ^/NotasCompensadas-FBL1(/.*)$ $1 break;
    proxy_pass http://backend:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  location /health/ {
    proxy_pass http://backend:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  location /NotasCompensadas-FBL1/ws/ {
    rewrite ^/NotasCompensadas-FBL1(/.*)$ $1 break;
    proxy_pass http://backend:8000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /ws/ {
    proxy_pass http://backend:8000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}
