version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ipc: host
    init: true
    security_opt:
      - seccomp=Conectividade/seccomp-playwright.json
    environment:
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://automacao.logtudo.com.br}
      - JOBS_BASE_DIR=/tmp/notas_compensadas
      - TZ=${TZ:-America/Sao_Paulo}
    volumes:
      - jobs_data:/tmp/notas_compensadas
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_APP_BASE_PATH: ${VITE_APP_BASE_PATH:-/NotasCompensadas-FBL1/}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/NotasCompensadas-FBL1/}
        VITE_WS_BASE_URL: ${VITE_WS_BASE_URL:-}
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "80"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://127.0.0.1/NotasCompensadas-FBL1/health/ready | grep -q '\"status\":\"ready\"'",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  jobs_data:
