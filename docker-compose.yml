version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: notas_compensadas_backend
    environment:
      - ALLOWED_ORIGINS=http://localhost:8080
      - JOBS_BASE_DIR=/tmp/notas_compensadas
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_APP_BASE_PATH: ${VITE_APP_BASE_PATH:-/NotasCompensadas-FBL1/}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/NotasCompensadas-FBL1/}
        VITE_WS_BASE_URL: ${VITE_WS_BASE_URL:-}
    container_name: notas_compensadas_frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
