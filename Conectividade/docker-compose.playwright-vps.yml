services:
  backend:
    build:
      context: .
      dockerfile: Conectividade/Dockerfile.playwright-vps
    container_name: notas-compensadas-playwright-backend
    restart: unless-stopped
    ipc: host
    init: true
    security_opt:
      - seccomp=Conectividade/seccomp-playwright.json
    env_file:
      - Conectividade/.env.playwright-vps
    environment:
      - TZ=${TZ:-America/Sao_Paulo}
    volumes:
      - jobs_data:/tmp/notas_compensadas
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  jobs_data:
